version: '3.8'

services:
  app:
    build: .
    container_name: image_app
    ports:
      - "8000:8000"
    volumes:
      - images:/images
      - logs:/logs
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: image_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - images:/usr/share/nginx/html/images:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - app
    networks:
      - internal
    restart: unless-stopped

volumes:
  images:
  logs:

networks:
  internal:
    driver: bridge