services:
  db:
    image: postgres:15
    container_name: image_db
    environment:
      POSTGRES_DB: images_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  app:
    build: .
    container_name: image_app
    ports:
      - "8000:8000"
    volumes:
      - ./images:/images
      - ./logs:/logs
      - ./backups:/backups
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=images_db
      - DB_USER=postgres
      - DB_PASSWORD=secretpass
    depends_on:
      - db
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: image_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - app
    networks:
      - internal
    restart: unless-stopped

volumes:
  db_data:

networks:
  internal:
    driver: bridge