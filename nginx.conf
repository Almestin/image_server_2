events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    upstream backend {
        server app:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Проксирование загрузки на бекенд (ВАЖНО: location /upload должен быть ПЕРВЫМ)
        location /upload {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # Раздача загруженных изображений
        location /images/ {
            alias /usr/share/nginx/html/images/;
            autoindex off;
            expires max;
        }

        # Статика интерфейса
        location /image-uploader/ {
            alias /usr/share/nginx/html/static/image-uploader/;
        }

        # Все остальные запросы (HTML-страницы)
        location / {
            root /usr/share/nginx/html/static;
            try_files $uri $uri/ /index.html;
        }
    }
}